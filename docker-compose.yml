services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./cost_leak_killer.db}
      API_HOST: 0.0.0.0
      API_PORT: ${PORT:-8000}
      ISOLATION_FOREST_CONTAMINATION: 0.1
      MAX_UPLOAD_SIZE: 10485760
      DEFAULT_CURRENCY: USD
      SAVINGS_MULTIPLIER: 0.3
      LOG_LEVEL: INFO
    networks:
      - cost-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      STREAMLIT_SERVER_HEADLESS: true
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    depends_on:
      - backend
    networks:
      - cost-network
    restart: always

networks:
  cost-network:
    driver: bridge

volumes:
  backend-data:
  frontend-data:
